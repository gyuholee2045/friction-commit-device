; friction-commit-device — PlatformIO
;
; Phase 1-2 (현재): 보드 비의존 코어(lib/core) + 호스트(native) 단위 테스트.
;   -> 컴파일러/하드웨어 없이 노트북에서 검증.
; Phase 3 (이후): src/main.cpp 가 Arduino Uno 핀 I/O 를 코어에 연결.
;   -> Wokwi 가상 보드에서 동작 확인.

[platformio]
default_envs = native

; ---- 호스트(노트북) 단위 테스트용. 순수 로직만 컴파일, Arduino 의존 없음 ----
[env:native]
platform = native
test_framework = unity
build_flags = -std=c++17 -Wall -Wextra

; ---- Arduino Uno 빌드/업로드용 (Phase 3 에서 src/main.cpp 추가 후 사용) ----
[env:uno]
platform = atmelavr
board = uno
framework = arduino
monitor_speed = 115200
